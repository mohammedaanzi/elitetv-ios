<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Account Info</title>
  <link rel="stylesheet" href="css/account.css">
  
  <script>
    (function() {
      // TV Handshake Logic
      var isTV = navigator.userAgent.indexOf("Diptv-App-TV-Mode") > -1;
      if (isTV) {
        document.documentElement.classList.add("tv-mode");
        var link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = "css/tv-overrides.css";
        document.head.appendChild(link);
      }
    })();
  </script>
</head>
<body>

  <div id="account-viewport">
    
    <!-- Header -->
    <header class="view-header">
      <h1 class="view-title">ACCOUNT INFO</h1>
      <div id="view-clock">00:00</div>
    </header>

    <!-- Main Content -->
    <main class="details-grid">
      
      <!-- Left Column: User Identity -->
      <section class="identity-panel module-glass">
        <img src="images/ic-user.png" alt="User" class="identity-avatar" onerror="this.src='images/login-logo.png'">
        
        <div class="identity-text-zone">
            <h2 id="val-username">Loading...</h2>
            <div class="badge-pill" id="val-status">Checking...</div>
        </div>
      </section>

      <!-- Right Column: Subscription Details -->
      <section class="metrics-panel module-glass">
        
        <div class="metric-item">
          <span class="metric-label">Expiration Date</span>
          <span class="metric-val" id="val-expiry">...</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">Max Connections</span>
          <span class="metric-val" id="val-max">...</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">Active Connections</span>
          <span class="metric-val" id="val-active">...</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">Trial Account</span>
          <span class="metric-val" id="val-trial">...</span>
        </div>

        <div class="metric-item">
          <span class="metric-label">Created At</span>
          <span class="metric-val" id="val-created">...</span>
        </div>

      </section>
    </main>

    <!-- Footer Actions -->
    <footer class="command-bar">
      <button id="cmd-return" type="button" class="action-node glass-button">
        BACK TO HOME
      </button>
      
      <button id="cmd-disconnect" type="button" class="action-node glass-button btn-critical">
        SIGN OUT
      </button>
    </footer>

  </div>

  <script src="js/account.js"></script>

</body>
</html>
