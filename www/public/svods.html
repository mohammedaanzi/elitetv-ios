<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Series - ozzie</title>
  <link rel="stylesheet" href="css/vods.css" /> 
  
  <!-- HLS Support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- TV DETECTION -->
  <script>
    (function() {
      var isTV = navigator.userAgent.indexOf("Diptv-App-TV-Mode") > -1;
      if (isTV) {
        document.documentElement.classList.add("tv-mode");
        var link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = "css/tv-overrides.css";
        document.head.appendChild(link);
      }
    })();
  </script>
</head>
<body>
  <div id="app-root">
    <!-- Content injected by svods.js -->
  </div>

  <!-- 🟢 CUSTOM VOD PLAYER OVERLAY -->
  <div id="custom-player" class="player-overlay" style="display:none;">
    
    <!-- Video Element -->
    <video id="main-video" playsinline preload="auto" style="background:#000;"></video>

    <!-- UI Layer -->
    <div id="player-ui" class="player-ui-layer">
        
        <!-- Header -->
        <div class="player-header">
            <button id="player-back-btn" class="glass-btn">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <div class="header-text">
                <span id="player-channel-name">Episode Title</span>
                <span id="player-status">SERIES</span>
            </div>
        </div>

        <!-- Center Controls (Rewind - Play/Pause - Forward) -->
        <div class="mid-controls">
            <!-- Rewind 10s -->
            <button id="btn-rewind" class="nav-circle small">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
            </button>

            <!-- Play/Pause -->
            <button id="btn-play-pause" class="nav-circle big">
                <!-- Play Icon -->
                <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                <!-- Pause Icon -->
                <svg id="icon-pause" viewBox="0 0 24 24"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>

            <!-- Forward 10s -->
            <button id="btn-forward" class="nav-circle small">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 12.5c0 3.54-3.01 6.55-6.6 7.6l-.78-2.37c3.19-1.05 5.38-4.06 5.38-7.73 0-1.96-.72-3.73-1.88-5.12L2.5 8.5V1h9v6.5L9.6 5.6C11.51 7.01 12.5 9.4 12.5 12.5z"/></svg>
            </button>
        </div>

        <!-- Touch Layer -->
        <div id="touch-layer"></div>

        <!-- Footer (Progress Bar) -->
        <div class="player-footer">
            <span id="current-time">00:00</span>
            <input type="range" id="progress-bar" value="0" min="0" step="1">
            <span id="total-duration">00:00</span>
        </div>
    </div>

    <!-- Loader -->
    <div id="player-loader" class="loader">
        <div class="spinner"></div>
    </div>
  </div>

  <script defer>
    const username = localStorage.getItem('iptv_username');
    const password = localStorage.getItem('iptv_password');
    if (!username || !password) location.href = 'index.html';
  </script>

  <script src="js/svods.js" defer></script>
</body>
</html>
